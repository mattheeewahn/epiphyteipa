name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use latest available Xcode
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Create Xcode project manually
        run: |
          # Create a minimal xcodeproj without XcodeGen
          mkdir -p Epiphyte.xcodeproj

          cat > Epiphyte.xcodeproj/project.pbxproj << 'PBXEOF'
          // !$*UTF8*$!
          {
            archiveVersion = 1;
            classes = {};
            objectVersion = 56;
            rootObject = ROOT_PROJECT;
            objects = {
              ROOT_PROJECT = {
                isa = PBXProject;
                buildConfigurationList = PROJECT_BUILD_CONFIG_LIST;
                compatibilityVersion = "Xcode 14.0";
                mainGroup = MAIN_GROUP;
                targets = (APP_TARGET);
              };
              MAIN_GROUP = {
                isa = PBXGroup;
                children = (SOURCES_GROUP);
                sourceTree = "<group>";
              };
              SOURCES_GROUP = {
                isa = PBXGroup;
                children = ();
                name = Sources;
                path = Sources;
                sourceTree = "<group>";
              };
              APP_TARGET = {
                isa = PBXNativeTarget;
                name = Epiphyte;
                buildConfigurationList = TARGET_BUILD_CONFIG_LIST;
                buildPhases = (SOURCES_PHASE);
                productName = Epiphyte;
                productType = "com.apple.product-type.application";
              };
              SOURCES_PHASE = {
                isa = PBXSourcesBuildPhase;
                files = ();
              };
              PROJECT_BUILD_CONFIG_LIST = {
                isa = XCConfigurationList;
                buildConfigurations = (PROJECT_RELEASE);
              };
              PROJECT_RELEASE = {
                isa = XCBuildConfiguration;
                name = Release;
                buildSettings = {
                  SDKROOT = iphoneos;
                  IPHONEOS_DEPLOYMENT_TARGET = 16.0;
                };
              };
              TARGET_BUILD_CONFIG_LIST = {
                isa = XCConfigurationList;
                buildConfigurations = (TARGET_RELEASE);
              };
              TARGET_RELEASE = {
                isa = XCBuildConfiguration;
                name = Release;
                buildSettings = {
                  PRODUCT_BUNDLE_IDENTIFIER = org.epiphyte.app;
                  SWIFT_VERSION = 5.9;
                  CODE_SIGN_IDENTITY = "";
                  CODE_SIGNING_REQUIRED = NO;
                };
              };
            };
          }
          PBXEOF

      - name: Build with swift
        run: |
          # Build as macOS executable first to verify compilation
          swift build -c release 2>&1 || true

      - name: Build for iOS Simulator
        run: |
          # Use xcodebuild with the Swift package directly
          xcodebuild \
            -scheme Epiphyte \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -50

      - name: Package app
        run: |
          # Find the built .app
          APP_PATH=$(find build -name "Epiphyte.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r Epiphyte.ipa Payload
            echo "IPA created successfully"
          else
            echo "Building as Swift package instead..."
            swift build -c release
            mkdir -p output
            cp -r .build/release/Epiphyte output/ 2>/dev/null || echo "Binary at .build/release/"
            zip -r Epiphyte-build.zip .build/release/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Epiphyte-iOS
          path: |
            Epiphyte.ipa
            Epiphyte-build.zip
          if-no-files-found: warn
